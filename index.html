<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francesco Biasi</title>
<style>
body {
    font-family: "Source Code Pro", monospace;
    margin: 20px;
    background: #fff;
    color: #000;
    line-height: 1.4;
    font-size: 12px;
    transition: all 0.5s ease;
}

/* Matrix mode styles */
body.matrix-mode {
    font-family: "Courier New", "Lucida Console", monospace;
    background: #001100;
    color: #00ff00;
}

.matrix-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.3s;
    z-index: 1000;
}

body.matrix-mode .matrix-toggle {
    color: #00ff00;
}

.matrix-toggle:hover {
    opacity: 1;
}

a {
    color: #000;
    text-decoration: underline;
    font-size: 12px;
    transition: color 0.5s ease;
}

body.matrix-mode a {
    color: #00ff00;
}

a:visited {
    color: #000;
}

body.matrix-mode a:visited {
    color: #00cc00;
}

h1 {
    font-size: 14px;
    font-weight: bold;
    margin: 0 0 20px 0;
    transition: color 0.5s ease;
}

body.matrix-mode h1 {
    color: #00ff00;
}

p {
    font-size: 12px;
    margin: 0 0 15px 0;
    transition: color 0.5s ease;
}

body.matrix-mode p {
    color: #00ff00;
}

.links {
    margin: 20px 0;
}

.links a {
    display: block;
    margin: 8px 0;
    font-size: 12px;
}

.links a[href="statisfy.html"],
.links a[onclick*="randomPage"] {
    color: #0066ff;
}

body.matrix-mode .links a[href="statisfy.html"],
body.matrix-mode .links a[onclick*="randomPage"] {
    color: #00ffff;
}

@media (max-width: 600px) {
    body { margin: 15px; }
    h1 { font-size: 16px; }
    p, a { font-size: 14px; }
    .links a { font-size: 14px; }
}
</style>
</head>
<body>

<button class="matrix-toggle" onclick="toggleMatrix()" title="">[alt]</button>

<h1>Francesco Biasi</h1>

<p>Welcome — happy to have you here!</p>

<div class="links">
<a href="about.html">about</a>
<a href="outputs.html">outputs</a>
<a href="phd.html">phd</a>
<a href="links.html">links</a>
<a href="ping.html">ping</a>
<a href="statisfy.html">👁️ statisfy.exe</a>
<a href="#" onclick="randomPage(); return false;">🎲 random page</a>
</div>

<script>
function randomPage() {
    const pages = [
        'about.html',
        'outputs.html',
        'phd.html',
        'links.html',
        'ping.html',
        'projects/project1.html',
        'projects/project2.html',
        'projects/project3.html',
        'projects/project4.html',
        'phd-details.html',
        'statisfy.html'
    ];
    const random = pages[Math.floor(Math.random() * pages.length)];
    window.location.href = random;
}

function toggleMatrix() {
    const body = document.body;
    const isMatrixMode = body.classList.contains('matrix-mode');
    
    if (isMatrixMode) {
        body.classList.remove('matrix-mode');
        localStorage.removeItem('matrixMode');
    } else {
        body.classList.add('matrix-mode');
        localStorage.setItem('matrixMode', 'true');
    }
}

// Check if matrix mode was previously enabled
document.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('matrixMode') === 'true') {
        document.body.classList.add('matrix-mode');
    }
});

// keyboard shortcut
document.addEventListener('keydown', function(e) {
    if (e.key === 'r' && e.ctrlKey) {
        e.preventDefault();
        randomPage();
    }
});
</script>

</body>
</html>
